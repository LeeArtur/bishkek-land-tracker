name: Nightly Scrape

on:
  schedule:
    - cron: '0 20 * * *'  # 02:00 Bishkek time (UTC+6)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: bishkek-land-tracker/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bishkek-land-tracker/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python run_scrape.py
